<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>byakugan</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-title">
      <img class="logo" src="byakugan.png" alt="byakugan">
      <h1>byakugan</h1>
    </div>
    <div class="header-right">
      <div id="usage-stats" class="usage-stats"></div>
      <div class="header-stats">
        <span class="badge working" id="stat-working">0 working</span>
        <span class="badge idle" id="stat-idle">0 idle</span>
      </div>
      <span class="updated" id="last-updated">—</span>
      <button class="demo-toggle" id="demo-toggle" title="Demo mode">Demo</button>
    </div>
  </header>

  <main>
    <div id="process-grid" class="process-grid">
      <div class="empty-state">Connecting...</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>

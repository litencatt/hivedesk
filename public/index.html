<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claudes-watch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-title">
      <span class="logo">🤖</span>
      <h1>claudes-watch</h1>
    </div>
    <div class="header-stats">
      <span class="badge working" id="stat-working">0 working</span>
      <span class="badge idle" id="stat-idle">0 idle</span>
      <span class="updated" id="last-updated">—</span>
    </div>
  </header>

  <main>
    <div id="process-grid" class="process-grid">
      <div class="empty-state">Connecting...</div>
    </div>
    <section id="editor-section">
      <h2 class="section-title">Editor windows (no Claude)</h2>
      <div id="editor-grid" class="process-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

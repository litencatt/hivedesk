<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hivedesk</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-title">
      <img class="logo" src="claude.svg" alt="Claude">
      <h1>hivedesk</h1>
    </div>
    <div class="header-stats">
      <span class="badge working" id="stat-working">0 working</span>
      <span class="badge idle" id="stat-idle">0 idle</span>
      <span class="updated" id="last-updated">—</span>
      <span class="hint">click card to focus window</span>
    </div>
  </header>

  <main>
    <div id="process-grid" class="process-grid">
      <div class="empty-state">Connecting...</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>

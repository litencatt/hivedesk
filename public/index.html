<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claudes-watch</title>
  <link rel="icon" href="claude-color.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-title">
      <img class="logo" src="claude-color.png" alt="Claude">
      <h1>claudes-watch</h1>
    </div>
    <div class="header-stats">
      <span class="badge working" id="stat-working">0 working</span>
      <span class="badge idle" id="stat-idle">0 idle</span>
      <span class="updated" id="last-updated">—</span>
    </div>
  </header>

  <main>
    <div id="process-grid" class="process-grid">
      <div class="empty-state">Connecting...</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>

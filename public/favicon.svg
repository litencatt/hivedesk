    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f0e4d0"/>
      <stop offset="100%" stop-color="#d8c4a8"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">

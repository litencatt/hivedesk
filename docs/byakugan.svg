<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="eye">
      <circle cx="16" cy="16" r="12.5"/>
    </clipPath>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f0e4d0"/>
      <stop offset="100%" stop-color="#d8c4a8"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="14" fill="url(#glow)" opacity="0.5"/>
  <circle cx="16" cy="16" r="13" fill="white" opacity="0.15"/>
  <!-- 回路パターン (直線・直角) -->
  <g stroke="white" stroke-linecap="square" fill="none" opacity="0.8" clip-path="url(#eye)">
    <!-- 上 -->
    <polyline points="16,3 16,8 15,9 15,13" stroke-width="0.42"/>
    <polyline points="14,4 14,7 13,8 13,11" stroke-width="0.28"/>
    <polyline points="18,4 18,7 17,8" stroke-width="0.18"/>
    <!-- 上右 -->
    <polyline points="20,4 20,8 19,9 19,13" stroke-width="0.42"/>
    <polyline points="22,5 22,8 21,9 21,11" stroke-width="0.18"/>
    <polyline points="23,7 23,9 22,10 22,12 21,13" stroke-width="0.28"/>
    <!-- 右 -->
    <polyline points="27,10 24,10 23,11 21,11 20,12 19,13" stroke-width="0.42"/>
    <polyline points="29,13 26,13 25,14 23,14 21,15" stroke-width="0.28"/>
    <polyline points="29,16 26,16 25,17 23,17 21,17" stroke-width="0.28"/>
    <polyline points="28,12 26,12 25,13" stroke-width="0.18"/>
    <!-- 右下 -->
    <polyline points="28,20 25,20 24,19 22,19 21,18 19,18" stroke-width="0.42"/>
    <polyline points="26,23 24,23 23,22 21,22 20,21 19,20" stroke-width="0.28"/>
    <polyline points="24,25 23,25 22,24 21,24" stroke-width="0.18"/>
    <!-- 下 -->
    <polyline points="20,28 20,25 19,24 19,21 18,20" stroke-width="0.42"/>
    <polyline points="17,29 17,26 16,25 16,21" stroke-width="0.28"/>
    <polyline points="15,28 15,25 14,24 14,21" stroke-width="0.28"/>
    <polyline points="13,27 13,25 14,24" stroke-width="0.18"/>
    <!-- 左下 -->
    <polyline points="10,28 10,25 11,24 11,22 12,21 13,21" stroke-width="0.42"/>
    <polyline points="8,25 8,23 9,22 9,20 10,19 13,19" stroke-width="0.28"/>
    <polyline points="7,22 7,21 8,20 9,20" stroke-width="0.18"/>
    <!-- 左 -->
    <polyline points="3,19 6,19 7,18 9,18 10,17 13,17" stroke-width="0.42"/>
    <polyline points="3,16 6,16 7,15 9,15 11,15 13,16" stroke-width="0.28"/>
    <polyline points="4,13 7,13 8,14 10,14 12,15" stroke-width="0.28"/>
    <polyline points="5,11 7,11 8,12" stroke-width="0.18"/>
    <!-- 左上 -->
    <polyline points="6,9 8,9 9,10 11,10 12,11 13,13" stroke-width="0.42"/>
    <polyline points="7,7 9,7 10,8 11,8 12,10 13,12" stroke-width="0.28"/>
    <polyline points="10,5 10,7 11,8" stroke-width="0.18"/>
    <polyline points="12,4 12,7 13,8 14,8 14,12" stroke-width="0.28"/>
    <!-- ノード点 -->
    <circle cx="15" cy="9" r="0.35" fill="white"/>
    <circle cx="19" cy="9" r="0.35" fill="white"/>
    <circle cx="23" cy="14" r="0.35" fill="white"/>
    <circle cx="23" cy="19" r="0.35" fill="white"/>
    <circle cx="19" cy="24" r="0.35" fill="white"/>
    <circle cx="13" cy="24" r="0.35" fill="white"/>
    <circle cx="9" cy="19" r="0.35" fill="white"/>
    <circle cx="9" cy="13" r="0.35" fill="white"/>
  </g>
  <!-- 眼球外周縁取り (血管はみ出しカバー) -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="white" stroke-width="1"/>
  <!-- 瞳孔リング -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="rgba(200,185,165,0.6)" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="rgba(210,195,175,0.5)" stroke-width="0.6"/>
  <!-- 瞳孔 白 -->
  <circle cx="16" cy="16" r="5.5" fill="white" opacity="0.95"/>
  <circle cx="16" cy="16" r="5.5" fill="url(#glow)" opacity="0.3"/>
</svg>
